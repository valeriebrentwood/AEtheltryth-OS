name: build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Image
        uses: redhat-actions/buildah-build@v2
        with:
          image: aetheltryth-os
          tags: latest
          containerfiles: ./Containerfile
          extra-args: --no-cache
